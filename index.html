<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        AI Smart Timetable Generator
    </title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Google Font -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
          rel="stylesheet">

    <!-- Custom CSS -->

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container mt-5">

    <!-- MAIN TITLE -->

    <h1 id="typing-text" class="main-title text-center"></h1>

    <p class="text-center mb-5 text-light">

        Smart AI Powered College Scheduling System

    </p>

    <!-- FORM SECTION -->

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card p-4 shadow">

                <h3 class="mb-4 text-center">

                    Add Subjects & Faculty

                </h3>

                <form action="/generate" method="POST">

                    <!-- SUBJECT CONTAINER -->

                    <div id="subject-container">

                        <div class="row mb-3">

                            <div class="col-md-6">

                                <input type="text"
                                       name="subject[]"
                                       class="form-control"
                                       placeholder="Enter Subject Name"
                                       required>

                            </div>

                            <div class="col-md-6">

                                <input type="text"
                                       name="faculty[]"
                                       class="form-control"
                                       placeholder="Enter Faculty Name"
                                       required>

                            </div>

                        </div>

                    </div>

                    <!-- ADD MORE BUTTON -->

                    <button type="button"
                            class="btn btn-secondary w-100 mb-3"
                            onclick="addMoreSubjects()">

                        ➕ Add More Subjects

                    </button>

                    <!-- CLASS NAME -->

                    <input type="text"
                           name="class_name"
                           class="form-control mb-4"
                           placeholder="Enter Class Name"
                           required>

                    <!-- GENERATE BUTTON -->

                    <button type="submit"
                            class="btn-custom w-100 generate-btn">

                        🚀 Generate AI Timetable

                    </button>

                </form>

            </div>

        </div>

    </div>

    <!-- ACTION BUTTONS -->

    <div class="d-flex justify-content-center flex-wrap gap-4 mt-5">

        <!-- HISTORY -->

        <a href="/history"
           class="btn-custom text-decoration-none px-4 py-3">

            📚 Saved Timetables

        </a>

    </div>

</div>

<!-- CONFETTI -->

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

// CONFETTI

function launchConfetti() {

    confetti({
        particleCount: 200,
        spread: 100,
        origin: { y: 0.6 }
    });

}

document.querySelector(".generate-btn").addEventListener("click", function () {

    launchConfetti();

});


// ADD MORE SUBJECTS

function addMoreSubjects() {

    let container = document.getElementById("subject-container");

    let newRow = document.createElement("div");

    newRow.classList.add("row", "mb-3");

    newRow.innerHTML = `

        <div class="col-md-6">

            <input type="text"
                   name="subject[]"
                   class="form-control"
                   placeholder="Enter Subject Name"
                   required>

        </div>

        <div class="col-md-6">

            <input type="text"
                   name="faculty[]"
                   class="form-control"
                   placeholder="Enter Faculty Name"
                   required>

        </div>

    `;

    container.appendChild(newRow);

}


// TYPING EFFECT

const text = "Welcome to AI Powered Smart Timetable Generator";

let index = 0;

function typeEffect() {

    if (index < text.length) {

        document.getElementById("typing-text").innerHTML += text.charAt(index);

        index++;

        setTimeout(typeEffect, 50);

    }

}

window.onload = typeEffect;

</script>

</body>

</html>
