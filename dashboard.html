<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Analytics Dashboard</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Custom CSS -->

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <!-- Chart.js -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container mt-5">

    <!-- Title -->

    <h1 class="main-title">
        Analytics Dashboard
    </h1>

    <p class="text-center mb-5">
        Smart AI Powered College Scheduling System
    </p>

    <!-- Stats Section -->

    <div class="row mb-5">

        <!-- Faculty -->

        <div class="col-md-4">

            <div class="stats-box">

                <h2>
                    {{ faculty_count }}
                </h2>

                <p>
                    Total Faculty
                </p>

            </div>

        </div>

        <!-- Subjects -->

        <div class="col-md-4">

            <div class="stats-box">

                <h2>
                    {{ subject_count }}
                </h2>

                <p>
                    Total Subjects
                </p>

            </div>

        </div>

        <!-- Lectures -->

        <div class="col-md-4">

            <div class="stats-box">

                <h2>
                    {{ lecture_count }}
                </h2>

                <p>
                    Total Lectures
                </p>

            </div>

        </div>

    </div>

    <!-- Chart Card -->

    <div class="card p-4 shadow">

        <h3 class="mb-4">
            Faculty Workload Analysis
        </h3>

        <canvas id="workloadChart"></canvas>

    </div>

    <!-- Buttons -->

    <div class="text-center mt-5">

        <a href="/"
           class="generate-btn text-decoration-none">

            Back To Home

        </a>

    </div>

</div>

<!-- Chart Script -->

<script>

const ctx = document
    .getElementById('workloadChart')
    .getContext('2d');

new Chart(ctx, {

    type: 'bar',

    data: {

        labels: JSON.parse('{{ faculty_names | safe }}'),

        datasets: [{

            label: 'Assigned Subjects',

            data: JSON.parse('{{ faculty_loads | safe }}'),

            borderWidth: 2

        }]

    },

    options: {

        responsive: true,

        plugins: {

            legend: {

                labels: {

                    color: 'white'

                }

            }

        },

        scales: {

            x: {

                ticks: {

                    color: 'white'

                }

            },

            y: {

                ticks: {

                    color: 'white'

                }

            }

        }

    }

});

</script>

</body>
</html>
